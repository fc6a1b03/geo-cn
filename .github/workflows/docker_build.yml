name: GeoCN Docker Image CI

on:
  schedule:
    - cron: '0 2 15 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Geoip2
        working-directory: docker
        run: |
          chmod +x geoip2_sync.sh && ./geoip2_sync.sh
      
      - name: Generate timestamp
        id: timestamp
        run: |
          echo "CURRENT_TIMESTAMP=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: docker
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.timestamp.outputs.CURRENT_TIMESTAMP }}
          platforms: linux/amd64,linux/arm64
          outputs: type=image,compression=zstd,compression-level=9
